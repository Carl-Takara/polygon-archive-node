name: Deploy Polygon Archive Node

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - restart
          - stop
          - status

env:
  SERVER_IP: ${{ secrets.SERVER_IP }}
  SERVER_USER: ${{ secrets.SERVER_USER }}
  REMOTE_DIR: /opt/polygon-node

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.inputs.action == 'deploy'
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload files to server
        run: |
          ssh $SERVER_USER@$SERVER_IP "mkdir -p $REMOTE_DIR/scripts"
          scp docker-compose.yml $SERVER_USER@$SERVER_IP:$REMOTE_DIR/
          scp scripts/remote-setup.sh $SERVER_USER@$SERVER_IP:$REMOTE_DIR/scripts/
          scp scripts/monitor.sh $SERVER_USER@$SERVER_IP:$REMOTE_DIR/scripts/
          scp scripts/snapshot-download.sh $SERVER_USER@$SERVER_IP:$REMOTE_DIR/scripts/

      - name: Create .env on server
        run: |
          ssh $SERVER_USER@$SERVER_IP "cat > $REMOTE_DIR/.env << 'ENVEOF'
          SERVER_IP=${{ secrets.SERVER_IP }}
          SERVER_USER=${{ secrets.SERVER_USER }}
          SERVER_HOSTNAME=polygon.fiamma.io
          ETH_RPC_URL=${{ secrets.ETH_RPC_URL }}
          HEIMDALL_SEEDS=1500161dd491b67fb1ac81868952be49e2509c9f@52.78.36.216:26656,dd4a3f1750af5765266231b9e8ac56e0bd085735@137.184.229.251:26656,3a9a1de9b539484f7ddc040c7b032eb7b9ef0015@34.87.86.195:26656,7b218ebbfb42084e53f994e4dd7b7a2aec360e52@54.147.31.250:26656,c26558a7ad3ad3087579bd5e1661b2726bc29ef4@54.250.35.145:26656
          ERIGON_DATA_DIR=/data/erigon
          HEIMDALL_DATA_DIR=/data/heimdall
          USE_SNAPSHOT=true
          ENVEOF"

      - name: Run deployment
        run: |
          ssh $SERVER_USER@$SERVER_IP "chmod +x $REMOTE_DIR/scripts/*.sh && bash $REMOTE_DIR/scripts/remote-setup.sh"

      - name: Health check
        run: |
          sleep 15
          ssh $SERVER_USER@$SERVER_IP "curl -sf --max-time 10 http://localhost:8545 \
            -X POST -H 'Content-Type: application/json' \
            -d '{\"jsonrpc\":\"2.0\",\"method\":\"eth_syncing\",\"params\":[],\"id\":1}'" || echo "Node still initializing..."

  restart:
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'restart'
    steps:
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts 2>/dev/null

      - name: Restart services
        run: |
          ssh $SERVER_USER@$SERVER_IP "cd $REMOTE_DIR && docker compose down && docker compose up -d"

      - name: Check status
        run: |
          sleep 10
          ssh $SERVER_USER@$SERVER_IP "cd $REMOTE_DIR && docker compose ps"

  stop:
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'stop'
    steps:
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts 2>/dev/null

      - name: Stop services
        run: |
          ssh $SERVER_USER@$SERVER_IP "cd $REMOTE_DIR && docker compose down"

  status:
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'status'
    steps:
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts 2>/dev/null

      - name: Node status
        run: |
          ssh $SERVER_USER@$SERVER_IP "cd $REMOTE_DIR && docker compose ps && echo '' && bash scripts/monitor.sh"
